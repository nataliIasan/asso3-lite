{% extends 'base.html' %}
{% block content %}
<div class="page-form">
  <h1>Registrazione ENTE</h1>
  <form method="post" class="card form-card">
    {% csrf_token %}
    <table class="table">
      {{ form.as_table }}
    </table>
    <div style="margin-top:12px; margin-left: 10px;">
      <button class="btn" type="submit">Invia link</button>
      <a class="btn" href="{% url 'login_options' %}">Annulla</a>
    </div>
  </form>
</div>
{% endblock %}
