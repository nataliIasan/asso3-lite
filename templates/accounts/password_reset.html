{% extends 'base.html' %}
{% block content %}
<div class="page-form password-page ">
  <h1>Recupera password</h1>
  <div class="card form-card">
  <p>Inserisci la tua email per ricevere il link di reimpostazione.</p>

  <form method="post">
    {% csrf_token %}
    {{ form.email }}
    <div class="btn-group">
      <button type="submit" class="btn back-btn">Invia link</button>
      <a href="{% url 'login' %}" class="btn back-btn">Annulla</a>
    </div>
  </form>
</div>
</div>
{% endblock %}
