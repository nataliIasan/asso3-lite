{% extends 'base.html' %}

{% block content %}
<div class="page-form">
  
  <h1>Imposta una nuova password</h1>

  <form method="post" class="card form-card-custom">
    {% csrf_token %}
    
    {% for field in form %}
    <div class="form-group-flex">
      <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
      <div class="form-input-wrapper">
        {{ field }}
        
        {% if field.errors %}
          <div class="field-error-text">{{ field.errors|striptags }}</div>
        {% endif %}
      </div>
    </div>
    {% endfor %}
    
    <div class="btn-row custom-form-buttons-center">
      <button type="submit" class="btn">Salva nuova password</button>
    </div>
  </form>

</div>
{% endblock %}
