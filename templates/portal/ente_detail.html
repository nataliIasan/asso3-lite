{% extends 'base.html' %}
{% block content %}
<div class="page-form">
  
  <h1>{{ ente.nome }}</h1>

  <div class="card form-card-custom">
    
    <div class="form-group-flex">
      <label class="form-label">Codice Fiscale:</label>
      <div class="form-input-wrapper">
        <input type="text" class="input" value="{{ ente.codice_fiscale|default:'—' }}" readonly>
      </div>
    </div>

    <div class="form-group-flex">
      <label class="form-label">Telefono:</label>
      <div class="form-input-wrapper">
        <input type="text" class="input" value="{{ ente.telefono|default:'—' }}" readonly>
      </div>
    </div>

    <div class="form-group-flex">
      <label class="form-label">Email:</label>
      <div class="form-input-wrapper">
        <input type="text" class="input" value="{{ ente.email|default:'—' }}" readonly>
      </div>
    </div>

    <div class="form-group-flex">
      <label class="form-label">Doti disponibili:</label>
      <div class="form-input-wrapper">
        <input type="text" class="input" value="{{ ente.doti_disponibili }}" readonly>
      </div>
    </div>

    <div class="form-group-flex">
      <label class="form-label">Servizi extra:</label>
      <div class="form-input-wrapper">
        <textarea class="input" rows="4" readonly>{{ ente.servizi_extra|default:'' }}</textarea>
      </div>
    </div>
    
    <div class="btn-row custom-form-buttons">
      <a href="{% url 'scuola_visibili' %}" class="btn back-btn">← Torna indietro</a>
    </div>

  </div>
</div>
{% endblock %}
