{% extends 'base.html' %}

{% block content %}
<div class="page-form">
  
  <!-- Titolo della pagina e sottotitolo descrittivo -->
  <h1>Le scuole</h1>
  <p class="page-subtitle">Schede Scuola</p>

  <!-- Contenitore principale (Stile card personalizzato coerente con l'Hub) -->
  <div class="card form-card-custom">
    
    <!-- Gruppo contenitore per l'elenco delle scuole -->
    <div class="custom-list-group">
      {% for s in scuole %}
        {% if s.nome %}
          <!-- Elemento lista interattivo che rimanda al dettaglio della scuola -->
          <a href="{% url 'scuola_detail' s.pk %}" class="list-item-bar">
            <div class="list-item-title-wrapper">
              <span class="list-item-name">{{ s.nome }}</span>
            </div>
            <!-- Icona direzionale per coerenza visiva con gli altri elenchi del portale -->
            <span class="item-arrow">→</span>
          </a>
        {% endif %}
      {% empty %}
        <!-- Messaggio di fallback nel caso in cui non ci siano scuole registrate -->
        <p class="text-muted text-center">Nessuna scuola disponibile.</p>
      {% endfor %}
    </div>

    <!-- Pulsantiera di navigazione per tornare all'Hub dell'Ente -->
    <div class="btn-row custom-form-buttons">
      <a href="{% url 'ente_hub' %}" class="btn back-btn">← Torna indietro</a>
    </div>

  </div>
</div>
{% endblock %}
