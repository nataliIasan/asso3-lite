{% extends 'base.html' %}
{% block content %}
<div class="page-form">
  <h1>{% if mode == 'update' %}Modifica azienda{% else %}Nuova azienda{% endif %}</h1>

  <form method="post" class="card form-card">
    {% csrf_token %}
    <table class="table">
      {{ form.as_table }}
    </table>
    
    <div class="btn-row">
      <button class="btn" type="submit">Salva</button>
      <a class="btn back-btn" href="{% url 'ente_aziende_list' %}">Annulla</a>
    </div>
  </form>
</div>
{% endblock %}
