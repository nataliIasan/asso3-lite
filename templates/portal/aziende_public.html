{% extends 'base.html' %}

{% block content %}
<div class="page-form">
  
  <!-- Titolo della pagina e sottotitolo per l'elenco pubblico delle aziende -->
  <h1>Le aziende</h1>
  <p class="page-subtitle">Elenco delle aziende partner</p>

  <div class="card form-card-custom">
    
    <div class="custom-list-group">
      {% for a in items %}
        {% if a.nome %}
          <!-- Riga dell'azienda non cliccabile per garantire la riservatezza dei dati -->
          <div class="list-item-bar">
            <div class="list-item-title-wrapper">
              <span class="list-item-name">{{ a.nome }}</span>
            </div>
          </div>
        {% endif %}
      {% empty %}
        <!-- Messaggio mostrato in caso di elenco vuoto nel database -->
        <p class="text-muted text-center">Nessuna azienda disponibile.</p>
      {% endfor %}
    </div>

    <!-- Pulsante inferiore per tornare alla landing page principale -->
    <div class="btn-row custom-form-buttons">
      <a href="{% url 'landing' %}" class="btn back-btn">← Torna indietro</a>
    </div>

  </div>
</div>
{% endblock %}
