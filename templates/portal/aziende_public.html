{% extends 'base.html' %}
{% block content %}
<h1>Le aziende</h1>

<div>
  <ul class="list-group list-group-flush">
    {% for a in items %}
      <li class="list-group-item">
        {{ a.nome }}
      </li>
    {% empty %}
      <li class="list-group-item text-muted">Nessuna azienda disponibile.</li>
    {% endfor %}
  </ul>
</div>

<a href="{% url 'landing' %}" class="btn back-btn">← Torna indietro</a>
{% endblock %}
