{% extends 'base.html' %}

{% block content %}
<div class="page-form">
  <h1>Profilo della scuola</h1>

  <!-- Scheda del profilo della scuola (Stile card personalizzato) -->
  <div class="card form-card-custom">
    
    <!-- Iterazione dinamica dei campi generali del modulo dell'istituto -->
    {% for field in form %}
    <div class="form-group-flex">
      <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
      <div class="form-input-wrapper">
        {{ field }}
      </div>
    </div>
    {% endfor %}

    <!-- Campo statico: Numero studenti con certificazione nell'Anno Scolastico -->
    <div class="form-group-flex">
      <label class="form-label">Studenti certificati (A.S.):</label>
      <div class="form-input-wrapper">
        <input type="text" class="input" value="{{ scuola.numero_studenti_certificati }}" readonly>
      </div>
    </div>

    <!-- Campo statico: Obiettivo FSL da attivare nell'Anno Scolastico -->
    <div class="form-group-flex">
      <label class="form-label">FSL da attivare (A.S.):</label>
      <div class="form-input-wrapper">
        <input type="text" class="input" value="{{ scuola.numero_fsl_da_attivare }}" readonly>
      </div>
    </div>

    <!-- Campo statico: Numero FSL effettivamente attivati nell'Anno Scolastico -->
    <div class="form-group-flex">
      <label class="form-label">FSL attivati (A.S.):</label>
      <div class="form-input-wrapper">
        <input type="text" class="input" value="{{ scuola.numero_fsl_attivati }}" readonly>
      </div>
    </div>
    
    <!-- Pulsantiera di navigazione (Torna all'Hub / Modifica i dati) -->
    <div class="btn-row custom-form-buttons">
      <a class="btn back-btn" href="{% url 'scuola_hub' %}">← Torna indietro</a>
      <a class="btn" href="{% url 'scuola_scheda_scuola_edit' %}">Modifica</a>
    </div>
  </div>
</div>
{% endblock %}
