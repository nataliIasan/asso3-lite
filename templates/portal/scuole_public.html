{% extends 'base.html' %}
{% block content %}

<div class="page-form">
  
  <h1>Le scuole</h1>
  <p class="page-subtitle">Schede Scuola</p>

  <div class="card form-card-custom">
    
    <div class="custom-list-group">
      {% for scuola in items %}
        {% if scuola.nome %}
          <div class="list-item-bar">
            <div class="list-item-title-wrapper">
              <span class="list-item-name">{{ scuola.nome }}</span>
            </div>
          </div>
        {% endif %}
      {% empty %}
        <p class="text-muted">Nessuna scuola disponibile.</p>
      {% endfor %}
    </div>

    <div class="btn-row custom-form-buttons">
      <a href="{% url 'landing' %}" class="btn back-btn">← Torna indietro</a>
    </div>

  </div>
</div>

{% endblock %}
