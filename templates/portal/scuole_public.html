{% extends 'base.html' %}
{% block content %}

<h1>Le scuole</h1>

<div>
  <ul>
    {% for scuola in items %}
      <li>
        {{ scuola.nome }}
      </li>
    {% empty %}
      <li>Nessuna scuola registrata.</li>
    {% endfor %}
  </ul>
</div>

<a href="{% url 'landing' %}" class="btn back-btn">← Torna indietro</a>

{% endblock %}
