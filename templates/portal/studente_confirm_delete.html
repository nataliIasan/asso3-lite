{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width:600px; margin:auto; padding:20px; border-radius:8px; background:#212842;">
    <h2 style="text-align:center;">⚠️ Conferma eliminazione</h2>
    <p style="text-align:center;">
        Sei sicuro di voler eliminare lo studente
        <strong>{{ studente.cognome }} {{ studente.nome }}</strong>?
    </p>
    <form method="post" style="text-align:center; margin-top:20px;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Elimina</button>
        <a href="{% url 'studente_detail' pk=studente.pk %}" class="btn btn-secondary">Annulla</a>
    </form>
</div>
{% endblock %}
