{% extends 'base.html' %}
{% block content %}
<h1>Scuole</h1>
<div class="visibili-card">
  <div class="visibili-card-header">
    <strong>Elenco scuole</strong>
  </div>
  <ul class="list-group list-group-flush">
    {% for s in items %}
      <li class="list-group-item">
        <a href="{% url 'scuola_detail' s.pk %}">
          {{ s.nome }}
        </a>
        {% if s.indirizzo %} — {{ s.indirizzo }}{% endif %}
      </li>
    {% empty %}
      <li class="list-group-item text-muted">Nessuna scuola disponibile.</li>
    {% endfor %}
  </ul>
</div>
<a href="{% url 'landing' %}" class="btn btn-secondary mt-3">← Torna indietro</a>
{% endblock %}
