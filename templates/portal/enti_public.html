{% extends 'base.html' %}
{% block content %}
{% load static %}

<div class="page-form">
  <h1>Gli enti</h1>
  <p class="page-subtitle">Elenco degli enti partner</p>
  <div class="card form-card-custom">
    <div class="custom-list-group">
      {% for e in items %}
        {% if e.nome %}
          <div class="list-item-bar">
            <div class="list-item-title-wrapper">
              <span class="list-item-name">{{ e.nome }}</span>
            </div>
          </div>
        {% endif %}
      {% empty %}
        <p class="text-muted text-center">Nessun ente disponibile.</p>
      {% endfor %}
    </div>

    <div class="btn-row custom-form-buttons">
      <a href="{% url 'landing' %}" class="btn back-btn">← Torna indietro</a>
    </div>

  </div>
</div>
{% endblock %}
