{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:600px; margin:auto; padding:20px; border-radius:8px; background:#212842; color:#fff;">
    <h2 style="text-align:center;">Modifica Studente</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="text-align:center; margin-top:20px;">
            <button type="submit" class="btn btn-primary">💾 Salva</button>
            <a href="{% url 'studente_detail' studente.pk %}" class="btn btn-secondary">Annulla</a>
        </div>
    </form>
</div>
{% endblock %}
