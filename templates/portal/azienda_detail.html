{% extends 'base.html' %}

{% block content %}
<div class="page-form">
  
  <h1>{{ azienda.nome }}</h1>

  <div class="card form-card-custom">
    
    <div class="form-group-flex">
      <label class="form-label">Nome azienda:</label>
      <div class="form-input-wrapper">
        <input type="text" class="input" value="{{ azienda.nome }}" readonly>
      </div>
    </div>

    <div class="form-group-flex">
      <label class="form-label">Contatto referente:</label>
      <div class="form-input-wrapper">
        <input type="text" class="input" value="{{ azienda.referente_contatti|default:'—' }}" readonly>
      </div>
    </div>

    <div class="form-group-flex">
      <label class="form-label">Settore:</label>
      <div class="form-input-wrapper">
        <input type="text" class="input" value="{{ azienda.settore|default:'—' }}" readonly>
      </div>
    </div>

    <div class="form-group-flex">
      <label class="form-label">FSL attivati nell'anno in corso:</label>
      <div class="form-input-wrapper">
        <input type="text" class="input" value="{{ azienda.fsl_attivati_anno_in_corso }}" readonly>
      </div>
    </div>

    <div class="form-group-flex">
      <label class="form-label">FSL attivati in totale:</label>
      <div class="form-input-wrapper">
        <input type="text" class="input" value="{{ azienda.fsl_attivati_totale }}" readonly>
      </div>
    </div>

    <div class="form-group-flex">
      <label class="form-label">Note:</label>
      <div class="form-input-wrapper">
        <textarea class="input" rows="4" readonly>{{ azienda.note|default:'' }}</textarea>
      </div>
    </div>
    
    <div class="btn-row custom-form-buttons">
      {% if request.user.role == 'ENTE' %}
        <a class="btn back-btn" href="{% url 'ente_aziende_list' %}">⬅ Torna indietro</a>
        <a class="btn" href="{% url 'ente_azienda_update' azienda.pk %}">Modifica</a>
      {% else %}
        <a class="btn back-btn" href="javascript:history.back()">⬅ Torna indietro</a>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
